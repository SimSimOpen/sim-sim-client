<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SimSim</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <app-root></app-root>

    <script>
      window.__YMAPS3_READY__ = false;
    </script>

    <script
      src="https://api-maps.yandex.ru/v3/?apikey=d274a689-ee61-43ea-83ff-333ac18efed4&lang=ru_RU"
      onload="
        ymaps3.ready.then(() => {
          window.__YMAPS3_READY__ = true;
        })
      "
      onerror="
        console.error(
          'Yandex Maps failed to load. Check that your domain is whitelisted in developer.tech.yandex.ru',
        )
      "
    ></script>
  </body>
</html>
