<main class="browse-page flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-900 mb-4">Browse Properties</h1>
    <div class="flex gap-4">
      <div class="relative flex-1">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-search absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-gray-400"
          aria-hidden="true"
        >
          <path d="m21 21-4.34-4.34"></path>
          <circle cx="11" cy="11" r="8"></circle>
        </svg>
        <input
          type="text"
          placeholder="Search by city, neighborhood, or zip code..."
          class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none shadow-sm"
        />
      </div>
      <button
        class="inline-flex items-center justify-center rounded-xl font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:pointer-events-none border border-gray-300 bg-transparent shadow-sm hover:bg-gray-50 text-gray-700 px-4 py-2 text-sm md:hidden gap-2"
        (click)="isFilterOpen = !isFilterOpen"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-sliders-horizontal h-5 w-5"
          aria-hidden="true"
        >
          <line x1="21" x2="14" y1="4" y2="4"></line>
          <line x1="10" x2="3" y1="4" y2="4"></line>
          <line x1="21" x2="12" y1="12" y2="12"></line>
          <line x1="8" x2="3" y1="12" y2="12"></line>
          <line x1="21" x2="16" y1="20" y2="20"></line>
          <line x1="12" x2="3" y1="20" y2="20"></line>
          <line x1="14" x2="14" y1="2" y2="6"></line>
          <line x1="8" x2="8" y1="10" y2="14"></line>
          <line x1="16" x2="16" y1="18" y2="22"></line>
        </svg>
        Filters
      </button>
    </div>
  </div>
  <div class="relative md:static flex flex-col md:flex-row gap-8">
    <app-filter [isFilterOpen]="isFilterOpen"></app-filter>
    <div class="flex-1">
      <div class="flex justify-between items-center mb-6">
        <p class="text-gray-600 font-medium">{{ filteredProperties.length }} properties found</p>
        <select
          class="bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-600 outline-none"
        >
          <option>Recommended</option>
          <option>Price: Low to High</option>
          <option>Price: High to Low</option>
          <option>Newest Arrivals</option>
        </select>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-6">
        @for (property of filteredProperties; track $index) {
          <div (click)="openViewPropertyModal(property)" class="cursor-pointer">
            <app-property-card [property]="property"></app-property-card>
          </div>
        }
      </div>
      <div class="mt-12 flex justify-center">
        <button
          class="inline-flex items-center justify-center rounded-md font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:pointer-events-none border border-gray-300 bg-transparent hover:bg-gray-50 text-gray-700 h-12 px-6 text-base px-8"
        >
          Load More Properties
        </button>
      </div>
    </div>
  </div>
</main>

<app-modal
  [isVisible]="isViewPropertyModalOpen"
  (close)="closeModal()"
  [closeOnBackdropClick]="true"
  [showCloseButton]="false"
>
  @if (isViewPropertyModalOpen) {
    <app-view-property
      [property]="selectedProperty"
      (closeModal)="closeModal()"
    ></app-view-property>
  }
</app-modal>
