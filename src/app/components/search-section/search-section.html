<div class="relative bg-white overflow-hidden">
  <div class="absolute inset-0">
    <img class="w-full h-full object-cover" [src]="coverImageUrl" alt="Beautiful home exterior" />
    <div class="absolute inset-0 bg-gray-900/60 mix-blend-multiply" data-id="element-248"></div>
  </div>
  <div
    class="relative max-w-7xl mx-auto py-24 px-4 sm:py-32 sm:px-6 lg:px-8 flex flex-col items-center text-center"
    data-id="element-249"
  >
    <h1
      class="text-4xl font-extrabold tracking-tight text-white sm:text-5xl lg:text-6xl"
      data-id="element-250"
      style="opacity: 1; transform: none"
    >
      Find your next perfect home
    </h1>
    <p
      class="mt-6 text-xl text-gray-100 max-w-3xl"
      data-id="element-251"
      style="opacity: 1; transform: none"
    >
      Discover premium rental properties in top neighborhoods. From modern downtown lofts to cozy
      suburban homes, we have exactly what you're looking for.
    </p>
    <div
      class="mt-10 w-full max-w-4xl bg-white rounded-full p-2 flex items-center shadow-xl"
      data-id="element-252"
      style="opacity: 1; transform: none"
    >
      <div class="flex-1 flex items-center px-6 border-r border-gray-200">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-map-pin h-5 w-5 text-gray-400 mr-3"
          aria-hidden="true"
        >
          <path
            d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"
          ></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
        <input
          type="text"
          placeholder="City, neighborhood, or zip code"
          class="w-full bg-transparent border-none focus:ring-0 text-gray-900 placeholder-gray-500 outline-none py-3"
          [(ngModel)]="searchTerm"
        />
      </div>
      <div class="hidden sm:flex items-center px-6 border-r border-gray-200" data-id="element-256">
        <select
          class="bg-transparent border-none focus:ring-0 text-gray-700 outline-none cursor-pointer py-3"
          (change)="searchAndFilterService.onFilterChange('type', $event)"
        >
          <option value="all">All Types</option>
          @for (type of allTypes; track $index) {
            <option>
              {{ type.charAt(0).toUpperCase() + type.slice(1).toLowerCase() }}
            </option>
          }
        </select>
      </div>
      <div class="hidden md:flex items-center px-6 border-r border-gray-200" data-id="element-262">
        <select
          class="bg-transparent border-none focus:ring-0 text-gray-700 outline-none cursor-pointer py-3"
          data-id="element-263"
        >
          <option data-id="element-264">Price Range</option>
          <option data-id="element-265">Under $2,000</option>
          <option data-id="element-266">$2,000 - $4,000</option>
          <option data-id="element-267">$4,000+</option>
        </select>
      </div>
      <button
        class="flex items-center justify-center rounded-full font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:pointer-events-none bg-blue-700 text-white hover:bg-blue-800 focus:ring-blue-700 shadow-sm h-12 px-6 text-base lg:px-8 ml-2 gap-2"
        (click)="onSearch(); $event.preventDefault()"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-search h-5 w-5"
          aria-hidden="true"
        >
          <path d="m21 21-4.34-4.34"></path>
          <circle cx="11" cy="11" r="8"></circle>
        </svg>
        Search
      </button>
    </div>
  </div>
</div>
