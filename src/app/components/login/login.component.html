<div class="login-component">
  <div class="main-section shadow-amber-50">
    <div class="bg-gray-100 rounded-lg mb-6 shadow-sm">
      <img
        src="https://cdn.magicpatterns.com/uploads/aU5nga6cn29SLca96rVN3h/SimSim-Logo.svg"
        alt="SimSim"
        class="h-25 w-25"
      />
    </div>
    <section class="top-section-text">
      <h1>Welcome to SimSim!</h1>
    </section>

    <section class="w-full">
      <form [formGroup]="loginForm" class="flex flex-col gap-4 space-y-4">
        @if (!isPhoneNumberSet) {
          <div class="w-full">
            <label class="block text-sm font-medium text-gray-700 mb-1.5 ml-1">
              Phone Number
            </label>
            <div
              class="relative border-2 border-gray-300 rounded-2xl focus-within:border-brand-purple transition-all duration-200"
            >
              <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-phone"
                  aria-hidden="true"
                >
                  <path
                    d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"
                  ></path>
                </svg>
              </div>
              <input
                class="w-full bg-slate-50 border-2 text-slate-900 placeholder:text-slate-400 focus:border-brand-purple focus:bg-white focus:ring-2 focus:ring-purple-500 focus:outline-none rounded-2xl transition-all duration-200 pl-11 pr-4 py-3"
                name="phone"
                type="tel"
                placeholder="+998 00 000 00 00"
                required=""
                value=""
                formControlName="phoneNumber"
              />
            </div>
          </div>
        } @else {
          <div class="text-center mb-4">
            <p class="text-sm text-slate-500">
              We sent a code to
              <span class="font-semibold text-slate-900">{{
                loginForm.get('phoneNumber')?.value
              }}</span>
            </p>
            <span
              class="text-xs text-brand-purple hover:underline mt-1"
              (click)="isPhoneNumberSet = false"
            >
              Change number
            </span>
          </div>
          <div class="w-full">
            <label class="block text-sm font-medium text-slate-700 mb-1.5 ml-1">
              Verification Code
            </label>
            <div
              class="relative border-2 border-slate-300 rounded-2xl focus-within:border-brand-purple transition-all duration-200"
            >
              <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-smartphone"
                  aria-hidden="true"
                >
                  <rect width="14" height="20" x="5" y="2" rx="2" ry="2"></rect>
                  <path d="M12 18h.01"></path>
                </svg>
              </div>
              <input
                class="w-full bg-slate-50 border-2 border-slate-100 text-slate-900 placeholder:text-slate-400 focus:border-brand-purple focus:bg-white focus:ring-2 focus:ring-purple-500 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed rounded-2xl transition-all duration-200 py-3 text-center tracking-widest text-lg"
                name="otp"
                type="text"
                placeholder="123456"
                required=""
                value=""
                formControlName="otpCode"
              />
            </div>
          </div>
        }

        <div>
          <button
            class="inline-flex items-center justify-center font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:pointer-events-none rounded-2xl bg-brand-purple hover:bg-purple-600 text-white focus:ring-brand-purple shadow-lg shadow-purple-200 h-14 px-8 text-lg w-full group mt-2"
            type="submit"
            tabindex="0"
            style="transform: none"
            (click)="sendCodeAndLogin()"
          >
            <span class="mr-2" data-id="element-139">{{
              isPhoneNumberSet ? 'Verify' : 'Send Code'
            }}</span
            ><svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-arrow-right group-hover:translate-x-1 transition-transform"
              aria-hidden="true"
            >
              <path d="M5 12h14"></path>
              <path d="m12 5 7 7-7 7"></path>
            </svg>
          </button>
        </div>
      </form>
    </section>
  </div>
</div>
