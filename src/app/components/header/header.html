<header>
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-20 items-center">
        <div class="flex items-center gap-2">
          <div class="bg-gray-100 rounded-lg shadow-sm">
            <img
              src="https://cdn.magicpatterns.com/uploads/aU5nga6cn29SLca96rVN3h/SimSim-Logo.svg"
              alt="SimSim"
              class="h-12"
            />
          </div>
        </div>
        <div class="hidden md:flex items-center gap-8">
          <a href="#browse" class="text-gray-600 hover:text-blue-700 font-medium transition-colors">
            Browse Properties
          </a>
          <a href="#about" class="text-gray-600 hover:text-blue-700 font-medium transition-colors">
            About Us
          </a>
          <a
            href="#contact"
            class="text-gray-600 hover:text-blue-700 font-medium transition-colors"
          >
            Contact
          </a>
        </div>
        <div class="hidden md:flex items-center gap-4">
          <button
            class="inline-flex items-center justify-center rounded-md font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:pointer-events-none text-gray-600 hover:bg-gray-100 hover:text-gray-900 h-10 px-4 py-2 text-sm font-medium"
            (click)="isOpenSignIn = true"
          >
            Sign In
          </button>
          <button
            class="inline-flex items-center justify-center rounded-md font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:pointer-events-none bg-blue-700 text-white hover:bg-blue-800 focus:ring-blue-700 shadow-sm h-10 px-4 py-2 text-sm font-medium shadow-md hover:shadow-lg transition-shadow"
          >
            List Property
          </button>
        </div>
        <div class="md:hidden flex items-center">
          <button class="text-gray-500 hover:text-gray-900 p-2" data-id="element-245">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-menu h-6 w-6"
              aria-hidden="true"
            >
              <path d="M4 12h16"></path>
              <path d="M4 18h16"></path>
              <path d="M4 6h16"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </nav>
</header>

<app-modal
  [isVisible]="isOpenSignIn"
  (close)="closeModal()"
  [closeOnBackdropClick]="true"
  [showCloseButton]="false"
>
  <app-login (closeModal)="closeModal()"></app-login>
</app-modal>
